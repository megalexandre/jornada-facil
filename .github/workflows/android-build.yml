name: Build APK

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restaurar google-services.json (Firebase)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Configure o secret GOOGLE_SERVICES_JSON com o conteúdo de app/android/app/google-services.json (JSON puro ou base64)."
            exit 1
          fi
          dest=android/app/google-services.json
          case "$(printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | cut -c1)" in
            '{') printf '%s' "$GOOGLE_SERVICES_JSON" > "$dest" ;;
            *)   printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | base64 -d > "$dest" \
                   || { echo "::error::GOOGLE_SERVICES_JSON não é JSON puro nem base64 válido."; exit 1; } ;;
          esac
          python3 -c "import json; json.load(open('$dest'))" \
            || { echo "::error::O conteúdo de GOOGLE_SERVICES_JSON não é um JSON válido."; exit 1; }
          echo "google-services.json restaurado ($(wc -c < "$dest") bytes)."

      - name: Build do APK (debug)
        run: |
          flutter clean
          flutter pub get
          flutter build apk --debug --dart-define-from-file=config/prod.json \
            --dart-define=BUILD_SHA=${GITHUB_SHA::7} \
            --dart-define=BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Preparar artefato
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk dist/jornadafacil-debug.apk

      - name: Publicar Release "latest" (link de download estável)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest dist/jornadafacil-debug.apk \
            --target "$GITHUB_SHA" \
            --title "Build mais recente (${GITHUB_SHA:0:7})" \
            --notes "APK debug gerado automaticamente do commit \`${GITHUB_SHA:0:7}\` em $(date -u '+%Y-%m-%d %H:%M UTC')."

          DL_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/latest/jornadafacil-debug.apk"
          {
            echo "##  APK disponível para download"
            echo ""
            echo "**[Baixar jornadafacil-debug.apk]($DL_URL)**"
            echo ""
            echo "Commit: \`${GITHUB_SHA:0:7}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload como artifact (backup, 90 dias)
        uses: actions/upload-artifact@v4
        with:
          name: jornadafacil-debug-apk
          path: app/dist/jornadafacil-debug.apk
          if-no-files-found: error
