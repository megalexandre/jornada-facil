name: jornada

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${API_DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-api_development}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    command: >
      bash -lc "(bundle check || bundle install) &&
      bin/rails db:migrate &&
      bin/rails db:seed &&
      sleep infinity"
    working_dir: /workspaces/jornada/api
    volumes:
      - .:/workspaces/jornada:cached
      - bundle:/usr/local/bundle 
      - pub_cache:/root/.pub-cache
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      BINDING: 0.0.0.0
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: "5432"
      DATABASE_USER: ${DATABASE_USER:-postgres}
      API_DATABASE_PASSWORD: ${API_DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-api_development}
    ports:
      - "${RAILS_PORT:-3000}:${RAILS_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Suíte BDD da raiz (Cucumber em Ruby, caixa-preta sobre a API por HTTP).
  # Sobe só sob demanda (profile `bdd`); dentro da rede a API é `http://api:3000`.
  # ---------------------------------------------------------------------------
  tests:
    image: ruby:3.4.10-slim
    profiles: ["bdd"]
    command: >
      bash -lc "apt-get update -qq &&
      apt-get install -y --no-install-recommends build-essential git >/dev/null &&
      (bundle check || bundle install) &&
      bundle exec cucumber"
    working_dir: /workspaces/jornada
    volumes:
      - .:/workspaces/jornada:cached
      - bdd_bundle:/usr/local/bundle
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:3000}
      API_HOST_HEADER: ${API_HOST_HEADER:-localhost}   
    depends_on:
      - api

volumes:
  pg_data:
  bundle:
  pub_cache:
  bdd_bundle:
