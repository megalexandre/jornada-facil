name: jornadafacil
description: "App de registro de jornada de trabalho em campo da FJ-Telecom."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ">=3.12.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  google_fonts: ^8.1.0
  geolocator: ^14.0.3
  latlong2: ^0.9.1
  flutter_map: ^8.3.1
  flutter_map_mbtiles: ^1.0.4
  mbtiles: ^0.4.2
  path_provider: ^2.1.5
  local_auth: ^2.1.0
  vibration: ^3.2.0
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/geofence.geojson
    - assets/maps/lages_do_batata.mbtiles
    - assets/maps/tiles/

