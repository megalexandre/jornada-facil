server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # Config de runtime: gerado a cada start do container. Nunca cachear, senão
    # a troca de API_BASE_URL não pegaria.
    location = /config.js {
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
